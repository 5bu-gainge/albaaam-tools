<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>고객군 수익성 매트릭스</title>
  <meta name="description" content="고객군별 매출·직접비·응대시간을 비교해 키울 고객과 줄일 고객을 나눈다" />
  <link rel="preload" as="style" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" onload="this.onload=null;this.rel='stylesheet'" />
  <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" /></noscript>
  <style>
    :root {
      --accent: #7c2d12;
      --accent-2: #0f766e;
      --bg: #f7f9f7;
      --surface: #ffffff;
      --surface-2: #eef7f4;
      --ink: #17211f;
      --muted: #53605d;
      --soft: #73807c;
      --line: #dce5e1;
      --danger: #b42318;
      --danger-bg: #fff2f0;
      --good: #0f766e;
      --warn: #b45309;
      word-break: keep-all;
      overflow-wrap: break-word;
    }
    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      font-family: "Pretendard", "Pretendard Variable", system-ui, -apple-system, "Malgun Gothic", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--ink);
      font-size: 16px;
      line-height: 1.6;
      word-break: keep-all;
      overflow-wrap: break-word;
    }
    a { color: inherit; }
    .wrap { width: min(1120px, 100%); margin: 0 auto; padding: 24px 16px 56px; }
    header { display: grid; gap: 10px; margin-bottom: 18px; }
    .eyebrow { color: var(--accent); font-size: .82rem; font-weight: 800; }
    h1 { margin: 0; font-size: clamp(1.7rem, 4vw, 2.55rem); line-height: 1.16; letter-spacing: 0; }
    .lede { margin: 0; color: var(--muted); max-width: 68ch; }
    .grid { display: grid; grid-template-columns: minmax(0, 1fr) minmax(340px, .95fr); gap: 16px; align-items: start; }
    .panel, .result-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 1px 2px rgba(15, 35, 30, .05), 0 12px 30px rgba(15, 35, 30, .07);
    }
    .panel { padding: 18px; }
    .result-card { padding: 18px; margin-bottom: 12px; }
    .form-grid { display: grid; gap: 12px; }
    label { display: grid; gap: 6px; font-weight: 750; }
    .hint { color: var(--soft); font-size: .84rem; font-weight: 500; }
    .input-wrap { position: relative; }
    input, textarea, select {
      width: 100%;
      border: 1px solid #cbd8d4;
      border-radius: 8px;
      padding: 12px 13px;
      color: var(--ink);
      background: #fff;
      font: inherit;
      min-height: 46px;
      outline: none;
    }
    textarea { resize: vertical; min-height: 104px; }
    input:focus, textarea:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 20%, transparent); }
    .suffix { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: var(--soft); font-size: .9rem; pointer-events: none; }
    .has-suffix input { padding-right: 54px; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }
    button {
      min-height: 44px;
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 10px 14px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
    }
    button.secondary { background: #fff; color: var(--accent); border-color: color-mix(in srgb, var(--accent) 35%, #cbd8d4); }
    button.ghost { background: transparent; color: var(--muted); border-color: var(--line); }
    button:focus-visible { outline: 3px solid color-mix(in srgb, var(--accent) 26%, transparent); outline-offset: 2px; }
    .notice { border-left: 4px solid var(--accent-2); background: #fff8eb; padding: 12px 14px; border-radius: 8px; color: #4b3521; margin-top: 14px; font-size: .92rem; }
    .summary { color: var(--muted); margin: 0; }
    .kpis { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; margin-top: 14px; }
    .kpi { background: var(--surface-2); border: 1px solid color-mix(in srgb, var(--accent) 16%, var(--line)); border-radius: 8px; padding: 12px; min-height: 94px; }
    .kpi .label { color: var(--muted); font-size: .82rem; font-weight: 800; }
    .kpi .value { display: block; margin-top: 6px; font-size: 1.26rem; line-height: 1.24; font-weight: 900; color: var(--accent); }
    .kpi .meta { display: block; margin-top: 4px; color: var(--soft); font-size: .82rem; }
    h2 { margin: 0 0 10px; font-size: 1.02rem; }
    .section-title { margin: 0 0 8px; font-size: .98rem; }
    table { width: 100%; border-collapse: collapse; font-size: .92rem; }
    th, td { border-bottom: 1px solid var(--line); padding: 9px 6px; text-align: left; vertical-align: top; }
    th { color: var(--muted); font-size: .8rem; }
    ul { margin: 8px 0 0; padding-left: 18px; }
    .copy-box { width: 100%; min-height: 180px; white-space: pre-wrap; background: #f9fbfa; border: 1px solid var(--line); border-radius: 8px; padding: 12px; color: var(--ink); font: inherit; }
    .error { background: var(--danger-bg); color: var(--danger); border: 1px solid #ffd0ca; border-radius: 8px; padding: 12px; font-weight: 750; }
    .empty { color: var(--soft); background: #f9fbfa; border: 1px dashed #cbd8d4; border-radius: 8px; padding: 18px; }
    footer { color: var(--soft); font-size: .82rem; margin-top: 22px; display: flex; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    @media (max-width: 860px) {
      .grid { grid-template-columns: 1fr; }
      .kpis { grid-template-columns: 1fr; }
      .wrap { padding: 20px 14px 46px; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { scroll-behavior: auto !important; transition-duration: .01ms !important; animation-duration: .01ms !important; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="eyebrow">고객 포트폴리오</div>
      <h1>고객군 수익성 매트릭스</h1>
      <p class="lede">고객군별 매출·직접비·응대시간을 비교해 키울 고객과 줄일 고객을 나눈다</p>
    </header>
    <main class="grid">
      <section class="panel" aria-labelledby="input-title">
        <h2 id="input-title">입력</h2>
        <form id="tool-form" class="form-grid"></form>
        <div class="actions">
          <button id="generate" type="button">결과 만들기</button>
          <button id="reset" class="ghost" type="button">초기화</button>
        </div>
        <div class="notice">간이 고객군 분석용입니다. 전략 중요도는 정성 판단이므로 실제 고객 인터뷰와 영업 데이터를 함께 보십시오.</div>
      </section>
      <section aria-live="polite" aria-label="결과" id="result"></section>
    </main>
    <footer>
      <span>v0.1.0 · 2026-07-09</span>
      <span>제작: marcus@gainge.com</span>
    </footer>
  </div>
  <script>
    const TOOL = {"slug":"customer-profitability-matrix","name":"고객군 수익성 매트릭스","short":"고객군별 매출·직접비·응대시간을 비교해 키울 고객과 줄일 고객을 나눈다","theme":"고객 포트폴리오","accent":"#7c2d12","accent2":"#0f766e","fields":[{"id":"hourly","label":"내부 시간당 원가","type":"number","suffix":"원","value":"50000"},{"id":"segments","label":"고객군 입력","type":"textarea","rows":7,"value":"초기 스타트업,3000000,1200000,18,5\n반복 구매 소상공인,1800000,600000,6,4\n대기업 파일럿,9000000,5500000,80,5\n저가 단발 문의,600000,200000,10,2","hint":"한 줄에 고객군,월매출,직접비,월응대시간,전략점수(1-5)"}],"disclaimer":"간이 고객군 분석용입니다. 전략 중요도는 정성 판단이므로 실제 고객 인터뷰와 영업 데이터를 함께 보십시오."};
    const computeTool = (form) => {
      const hourly = num(form.hourly);
      const rows = lines(form.segments).map(line => line.split(",").map(v => v.trim())).filter(v => v.length >= 5);
      if (!rows.length || hourly < 0) return errorResult("고객군을 쉼표 구분으로 한 줄 이상 입력하십시오.");
      const analyzed = rows.map(r => {
        const revenue = num(r[1]), cost = num(r[2]), hours = num(r[3]), score = num(r[4]);
        const timeCost = hours * hourly;
        const profit = revenue - cost - timeCost;
        const margin = revenue ? profit / revenue : 0;
        let zone = "관찰";
        if (profit >= 0 && score >= 4) zone = "키울 고객군";
        else if (profit < 0 && score >= 4) zone = "조건 재설계";
        else if (profit >= 0 && score < 4) zone = "자동화·유지";
        else zone = "축소 후보";
        return { name: r[0], revenue, cost, hours, score, timeCost, profit, margin, zone };
      });
      analyzed.sort((a, b) => b.profit - a.profit);
      const top = analyzed[0];
      const risk = analyzed.slice().sort((a, b) => a.profit - b.profit)[0];
      const copy = [
        "고객군 수익성 매트릭스",
        "- 가장 키울 고객군: " + top.name + " (" + money(top.profit) + ", " + top.zone + ")",
        "- 조건 재검토 고객군: " + risk.name + " (" + money(risk.profit) + ", " + risk.zone + ")",
        "- 다음 조치: 축소 후보는 가격, 범위, 응대 채널 중 하나를 바꾼다."
      ].join("\n");
      return {
        summary: "가장 수익성이 높은 고객군은 " + top.name + "입니다. " + risk.name + "은 조건을 다시 설계해야 합니다.",
        kpis: [
          { label: "최고 수익 고객군", value: top.name, meta: money(top.profit) },
          { label: "최대 누수 고객군", value: risk.name, meta: money(risk.profit) },
          { label: "분석 고객군", value: int(analyzed.length) + "개", meta: "시간 원가 반영" }
        ],
        sections: [
          { title: "매트릭스", table: analyzed.map(x => [x.name, money(x.profit) + " / " + pct(x.margin), x.zone]) },
          { title: "붙여넣기 요약", copy }
        ]
      };
    };
    const storageKey = "albaaam:" + TOOL.slug + ":v1";

    const formEl = document.getElementById("tool-form");
    const resultEl = document.getElementById("result");
    const generateBtn = document.getElementById("generate");
    const resetBtn = document.getElementById("reset");

    const nf = new Intl.NumberFormat("ko-KR");
    function num(value) {
      const n = Number(String(value ?? "").replace(/,/g, "").trim());
      return Number.isFinite(n) ? n : 0;
    }
    function int(value) { return nf.format(Math.round(Number(value) || 0)); }
    function money(value) { return nf.format(Math.round(Number(value) || 0)) + "원"; }
    function pct(value) { return ((Number(value) || 0) * 100).toFixed(Math.abs(value) < .1 ? 1 : 0) + "%"; }
    function safe(value) { return String(value ?? "").trim(); }
    function oneLine(value) { return safe(value).replace(/\s+/g, " ").replace(/[.。]+$/, ""); }
    function lines(value) { return safe(value).split(/\r?\n/).map(v => v.trim()).filter(Boolean); }
    function bulletLines(value) {
      const arr = lines(value);
      return arr.length ? arr.map(v => "- " + v.replace(/^[-*]\s*/, "")).join("\n") : "- 미정";
    }
    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, ch => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]));
    }
    function errorResult(message) { return { error: message }; }

    function fieldHtml(field, value) {
      const id = "field-" + field.id;
      const hint = field.hint ? '<span class="hint">' + escapeHtml(field.hint) + '</span>' : "";
      if (field.type === "textarea") {
        return '<label for="' + id + '">' + escapeHtml(field.label) + hint + '<textarea id="' + id + '" name="' + field.id + '" rows="' + (field.rows || 4) + '">' + escapeHtml(value) + '</textarea></label>';
      }
      if (field.type === "select") {
        const options = (field.options || []).map(opt => '<option value="' + escapeHtml(opt) + '"' + (opt === value ? " selected" : "") + '>' + escapeHtml(opt) + '</option>').join("");
        return '<label for="' + id + '">' + escapeHtml(field.label) + hint + '<select id="' + id + '" name="' + field.id + '">' + options + '</select></label>';
      }
      const suffix = field.suffix ? '<span class="suffix">' + escapeHtml(field.suffix) + '</span>' : "";
      return '<label for="' + id + '">' + escapeHtml(field.label) + hint + '<span class="input-wrap ' + (field.suffix ? "has-suffix" : "") + '"><input id="' + id + '" name="' + field.id + '" inputmode="' + (field.type === "number" ? "decimal" : "text") + '" type="' + (field.type === "number" ? "text" : "text") + '" value="' + escapeHtml(value) + '" />' + suffix + '</span></label>';
    }

    function readSaved() {
      try {
        const parsed = JSON.parse(localStorage.getItem(storageKey) || "{}");
        return parsed && typeof parsed === "object" ? parsed : {};
      } catch {
        return {};
      }
    }
    function readForm() {
      const data = {};
      for (const field of TOOL.fields) {
        const el = document.getElementById("field-" + field.id);
        data[field.id] = el ? el.value : "";
      }
      return data;
    }
    function saveForm() {
      try { localStorage.setItem(storageKey, JSON.stringify(readForm())); } catch {}
    }
    function renderForm() {
      const saved = readSaved();
      formEl.innerHTML = TOOL.fields.map(field => fieldHtml(field, saved[field.id] ?? field.value ?? "")).join("");
      formEl.addEventListener("input", () => { saveForm(); renderResult(); });
    }
    function renderResult() {
      let result;
      try {
        result = computeTool(readForm());
      } catch (err) {
        result = errorResult("계산 중 오류가 발생했습니다. 입력값을 다시 확인하십시오.");
      }
      if (!result) {
        resultEl.innerHTML = '<div class="empty">입력값을 채우면 결과가 표시됩니다.</div>';
        return;
      }
      if (result.error) {
        resultEl.innerHTML = '<div class="error">' + escapeHtml(result.error) + '</div>';
        return;
      }
      const kpis = (result.kpis || []).map(kpi => '<div class="kpi"><span class="label">' + escapeHtml(kpi.label) + '</span><strong class="value">' + escapeHtml(kpi.value) + '</strong><span class="meta">' + escapeHtml(kpi.meta || "") + '</span></div>').join("");
      const sections = (result.sections || []).map((section, index) => {
        let body = "";
        if (section.table) {
          body += '<table><thead><tr><th>항목</th><th>값</th><th>메모</th></tr></thead><tbody>' + section.table.map(row => '<tr>' + row.map(cell => '<td>' + escapeHtml(cell) + '</td>').join("") + '</tr>').join("") + '</tbody></table>';
        }
        if (section.items) {
          body += '<ul>' + section.items.map(item => '<li>' + escapeHtml(item) + '</li>').join("") + '</ul>';
        }
        if (section.copy) {
          body += '<textarea class="copy-box" readonly data-copy-source="' + index + '">' + escapeHtml(section.copy) + '</textarea><div class="actions"><button class="secondary" type="button" data-copy-index="' + index + '">복사</button></div>';
        }
        if (section.body) body += '<p>' + escapeHtml(section.body) + '</p>';
        return '<article class="result-card"><h2 class="section-title">' + escapeHtml(section.title) + '</h2>' + body + '</article>';
      }).join("");
      resultEl.innerHTML = '<article class="result-card"><p class="summary">' + escapeHtml(result.summary || "") + '</p><div class="kpis">' + kpis + '</div></article>' + sections;
    }
    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
        return true;
      } catch {}
      const area = document.createElement("textarea");
      area.value = text;
      area.setAttribute("readonly", "");
      area.style.position = "fixed";
      area.style.left = "-9999px";
      document.body.appendChild(area);
      area.select();
      let ok = false;
      try { ok = document.execCommand("copy"); } catch {}
      area.remove();
      if (!ok) window.prompt("아래 내용을 복사하십시오.", text);
      return ok;
    }
    document.addEventListener("click", async (event) => {
      const btn = event.target.closest("[data-copy-index]");
      if (!btn) return;
      const area = document.querySelector('[data-copy-source="' + btn.getAttribute("data-copy-index") + '"]');
      if (area) {
        await copyText(area.value);
        btn.textContent = "복사됨";
        window.setTimeout(() => { btn.textContent = "복사"; }, 1200);
      }
    });
    generateBtn.addEventListener("click", () => { saveForm(); renderResult(); resultEl.scrollIntoView({ behavior: "smooth", block: "start" }); });
    resetBtn.addEventListener("click", () => {
      try { localStorage.removeItem(storageKey); } catch {}
      renderForm();
      renderResult();
    });
    renderForm();
    renderResult();
  </script>
</body>
</html>
