<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>장애 회고 5Why 가이드</title>
  <meta name="description" content="장애나 실패를 원인·기여요인·재발방지로 회고한다" />
  <style>
    :root {
      --accent: #0f766e;
      --accent-2: #be123c;
      --bg: #f7f8fa;
      --surface: #ffffff;
      --surface-2: #f0f7f5;
      --ink: #151b1f;
      --muted: #53606a;
      --soft: #78838c;
      --line: #d9e1e6;
      --warn-bg: #fff8eb;
      word-break: keep-all;
      overflow-wrap: break-word;
    }
    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.6;
      word-break: keep-all;
      overflow-wrap: break-word;
    }
    .wrap { width: min(1160px, 100%); margin: 0 auto; padding: 24px 16px 54px; }
    header { margin-bottom: 18px; display: grid; gap: 8px; }
    .eyebrow { color: var(--accent); font-weight: 850; font-size: .86rem; }
    h1 { margin: 0; font-size: clamp(1.65rem, 4vw, 2.45rem); line-height: 1.18; letter-spacing: 0; }
    .lede { margin: 0; color: var(--muted); max-width: 72ch; }
    main { display: grid; grid-template-columns: minmax(0, .86fr) minmax(380px, 1.14fr); gap: 16px; align-items: start; }
    .panel, .result-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 1px 2px rgba(15, 35, 30, .04), 0 12px 26px rgba(15, 35, 30, .06);
    }
    .panel { padding: 18px; }
    .result-card { padding: 18px; margin-bottom: 12px; }
    h2 { margin: 0 0 10px; font-size: 1.04rem; }
    .form-grid { display: grid; gap: 12px; }
    label { display: grid; gap: 6px; font-weight: 800; }
    .hint { color: var(--soft); font-size: .84rem; font-weight: 520; }
    input, textarea, select {
      width: 100%;
      border: 1px solid #cbd6dd;
      border-radius: 8px;
      padding: 12px 13px;
      min-height: 46px;
      color: var(--ink);
      background: #fff;
      font: inherit;
      outline: none;
    }
    textarea { resize: vertical; min-height: 112px; }
    input:focus, textarea:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 20%, transparent); }
    .actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
    button {
      border: 1px solid transparent;
      border-radius: 8px;
      min-height: 44px;
      padding: 10px 14px;
      background: var(--accent);
      color: #fff;
      font: inherit;
      font-weight: 850;
      cursor: pointer;
    }
    button.secondary { background: #fff; color: var(--accent); border-color: color-mix(in srgb, var(--accent) 36%, #cbd6dd); }
    button.ghost { background: transparent; color: var(--muted); border-color: var(--line); }
    .notice { margin-top: 14px; border-left: 4px solid var(--accent-2); background: var(--warn-bg); padding: 12px 14px; border-radius: 8px; color: #4b3521; font-size: .92rem; }
    .summary { margin: 0; color: var(--muted); }
    .kpis { margin-top: 14px; display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; }
    .kpi { border: 1px solid color-mix(in srgb, var(--accent) 18%, var(--line)); border-radius: 8px; background: var(--surface-2); padding: 12px; min-height: 92px; }
    .kpi span { display: block; }
    .kpi .label { color: var(--muted); font-size: .82rem; font-weight: 850; }
    .kpi .value { margin-top: 5px; color: var(--accent); font-size: 1.2rem; font-weight: 900; line-height: 1.28; }
    .kpi .meta { margin-top: 4px; color: var(--soft); font-size: .82rem; }
    table { width: 100%; border-collapse: collapse; font-size: .92rem; }
    th, td { border-bottom: 1px solid var(--line); padding: 9px 6px; text-align: left; vertical-align: top; }
    th { color: var(--muted); font-size: .8rem; }
    ul { margin: 8px 0 0; padding-left: 18px; }
    .copy-box { width: 100%; min-height: 230px; border: 1px solid var(--line); border-radius: 8px; background: #f9fbfc; padding: 12px; color: var(--ink); white-space: pre-wrap; font: inherit; }
    footer { margin-top: 22px; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px; color: var(--soft); font-size: .82rem; }
    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; }
      .kpis { grid-template-columns: 1fr; }
      .wrap { padding: 20px 14px 46px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="eyebrow">운영 리스크</div>
      <h1>장애 회고 5Why 가이드</h1>
      <p class="lede">장애나 실패를 원인·기여요인·재발방지로 회고한다</p>
    </header>
    <main>
      <section class="panel" aria-labelledby="input-title">
        <h2 id="input-title">입력</h2>
        <form id="tool-form" class="form-grid"></form>
        <div class="actions">
          <button id="generate" type="button">결과 만들기</button>
          <button id="reset" type="button" class="ghost">초기화</button>
        </div>
        <div class="notice">입력값은 이 브라우저 안에만 저장됩니다. 결과는 AI에게 붙여 넣을 구조화 프롬프트와 내부 검토용 초안이며, 최종 판단은 실제 데이터와 담당자 확인을 거쳐 조정하십시오.</div>
      </section>
      <section id="result" aria-live="polite" aria-label="결과"></section>
    </main>
    <footer>
      <span>v0.1.0 · 2026-07-09</span>
      <span>제작: marcus@gainge.com</span>
    </footer>
  </div>
  <script>
    const TOOL = {"slug":"postmortem-5why-guide","name":"장애 회고 5Why 가이드","theme":"운영 리스크","short":"장애나 실패를 원인·기여요인·재발방지로 회고한다","labels":["현재 상황","원하는 결과","제약·주의점","원문 메모"],"deliverable":"장애 회고 5Why 가이드 결과물","steps":["목적과 배경을 정리한다","필요한 판단 기준을 만든다","리스크·예외·담당자를 붙인다","바로 실행할 문안 또는 체크리스트를 만든다"],"checks":["담당자와 다음 행동이 있는가","사실과 추정이 구분됐는가","읽는 사람이 바로 쓸 수 있는가"],"accent":"#0f766e","accent2":"#be123c"};
    const storageKey = "albaaam:" + TOOL.slug + ":v1";
    const formEl = document.getElementById("tool-form");
    const resultEl = document.getElementById("result");
    const generateBtn = document.getElementById("generate");
    const resetBtn = document.getElementById("reset");

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, function (ch) {
        return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch];
      });
    }
    function safe(value) { return String(value || "").trim(); }
    function compact(value) { return safe(value).replace(/\s+/g, " "); }
    function filled(value) { return safe(value).length > 0; }
    function lines(value) { return safe(value).split(/\r?\n/).map(function (v) { return v.trim(); }).filter(Boolean); }
    function readSaved() {
      try { return JSON.parse(localStorage.getItem(storageKey) || "{}") || {}; } catch { return {}; }
    }
    function saveForm() {
      try { localStorage.setItem(storageKey, JSON.stringify(readForm())); } catch {}
    }
    function readForm() {
      const data = {};
      TOOL.labels.forEach(function (_, index) {
        const el = document.getElementById("field-" + index);
        data["f" + index] = el ? el.value : "";
      });
      data.depth = (document.getElementById("field-depth") || {}).value || "실무형";
      return data;
    }
    function renderForm() {
      const saved = readSaved();
      const hints = ["상황을 구체적으로 적을수록 결과가 좋아집니다.", "이번 산출물이 달성해야 할 기준입니다.", "지켜야 할 조건, 민감한 맥락, 제외할 범위입니다.", "회의록, VOC, 숫자, 거친 메모를 그대로 붙여 넣어도 됩니다."];
      formEl.innerHTML = TOOL.labels.map(function (label, index) {
        const value = saved["f" + index] || "";
        const rows = index === 3 ? 6 : 3;
        return '<label for="field-' + index + '">' + escapeHtml(label) + '<span class="hint">' + escapeHtml(hints[index]) + '</span><textarea id="field-' + index + '" rows="' + rows + '">' + escapeHtml(value) + '</textarea></label>';
      }).join("") + '<label for="field-depth">출력 톤<span class="hint">바로 실행할 문서인지, 회의용 초안인지 고릅니다.</span><select id="field-depth"><option>실무형</option><option>경영진 보고형</option><option>고객 커뮤니케이션형</option><option>팀 워크숍형</option></select></label>';
      const depth = document.getElementById("field-depth");
      if (saved.depth) depth.value = saved.depth;
      formEl.addEventListener("input", function () { saveForm(); renderResult(); });
    }
    function score(data) {
      const values = [data.f0, data.f1, data.f2, data.f3];
      const complete = values.filter(filled).length * 25;
      const rawWords = values.join(" ").split(/\s+/).filter(Boolean).length;
      const readiness = Math.min(100, Math.round(complete * 0.55 + Math.min(rawWords, 160) / 160 * 45));
      const risk = Math.max(0, 100 - readiness);
      return { complete, readiness, risk };
    }
    function buildPrompt(data) {
      const checklist = TOOL.checks.map(function (item) { return "- " + item; }).join("\n");
      const steps = TOOL.steps.map(function (item, index) { return String(index + 1) + ". " + item; }).join("\n");
      return [
        "[역할]",
        "너는 한국어로 일하는 경영 실무 파트너다. 아래 정보를 바탕으로 " + TOOL.deliverable + "를 만든다.",
        "",
        "[입력]",
        "- " + TOOL.labels[0] + ": " + compact(data.f0 || "미입력"),
        "- " + TOOL.labels[1] + ": " + compact(data.f1 || "미입력"),
        "- " + TOOL.labels[2] + ": " + compact(data.f2 || "미입력"),
        "- " + TOOL.labels[3] + ":",
        safe(data.f3 || "미입력"),
        "- 출력 톤: " + data.depth,
        "",
        "[작업 순서]",
        steps,
        "",
        "[산출 형식]",
        "1. 결론 한 문장",
        "2. 우선순위 표: 항목 / 판단 / 이유 / 다음 행동",
        "3. 바로 붙여 넣을 초안",
        "4. 빠진 정보 질문 3개",
        "",
        "[검토 기준]",
        checklist,
        "",
        "[주의]",
        "모르는 사실은 추정이라고 표시하고, 숫자나 법적 판단은 최종 확정처럼 말하지 않는다."
      ].join("\n");
    }
    function renderResult() {
      const data = readForm();
      const s = score(data);
      const stepRows = TOOL.steps.map(function (step, index) {
        const basis = index === 0 ? data.f0 : index === 1 ? data.f1 : index === 2 ? data.f2 : data.f3;
        const memo = filled(basis) ? compact(basis).slice(0, 80) : "추가 입력 필요";
        return '<tr><td>' + escapeHtml(String(index + 1)) + '</td><td>' + escapeHtml(step) + '</td><td>' + escapeHtml(memo) + '</td></tr>';
      }).join("");
      const checklist = TOOL.checks.map(function (item) {
        return '<li>' + escapeHtml(item) + '</li>';
      }).join("");
      const prompt = buildPrompt(data);
      const summary = s.readiness >= 75
        ? "입력 정보가 충분합니다. 아래 프롬프트를 AI에 붙여 넣어 초안을 만든 뒤 검토 기준으로 다듬으십시오."
        : "초안 생성은 가능하지만 입력 공백이 있습니다. 특히 목표와 제약을 보강하면 결과 품질이 좋아집니다.";
      resultEl.innerHTML =
        '<article class="result-card"><p class="summary">' + escapeHtml(summary) + '</p><div class="kpis">' +
        '<div class="kpi"><span class="label">입력 충실도</span><span class="value">' + s.complete + '%</span><span class="meta">4개 핵심 입력 기준</span></div>' +
        '<div class="kpi"><span class="label">초안 준비도</span><span class="value">' + s.readiness + '%</span><span class="meta">정보량 반영</span></div>' +
        '<div class="kpi"><span class="label">보완 필요</span><span class="value">' + s.risk + '%</span><span class="meta">공백과 추정 위험</span></div>' +
        '</div></article>' +
        '<article class="result-card"><h2>작업 순서</h2><table><thead><tr><th>#</th><th>할 일</th><th>현재 근거</th></tr></thead><tbody>' + stepRows + '</tbody></table></article>' +
        '<article class="result-card"><h2>검토 체크리스트</h2><ul>' + checklist + '</ul></article>' +
        '<article class="result-card"><h2>복사용 AI 프롬프트</h2><textarea class="copy-box" id="copy-box" readonly>' + escapeHtml(prompt) + '</textarea><div class="actions"><button type="button" class="secondary" id="copy-btn">프롬프트 복사</button></div></article>';
      const copyBtn = document.getElementById("copy-btn");
      if (copyBtn) {
        copyBtn.addEventListener("click", function () {
          copyText(document.getElementById("copy-box").value, copyBtn);
        });
      }
    }
    async function copyText(text, btn) {
      try { await navigator.clipboard.writeText(text); }
      catch {
        const area = document.createElement("textarea");
        area.value = text;
        area.style.position = "fixed";
        area.style.left = "-9999px";
        document.body.appendChild(area);
        area.select();
        try { document.execCommand("copy"); } catch {}
        area.remove();
      }
      if (btn) {
        const old = btn.textContent;
        btn.textContent = "복사됨";
        window.setTimeout(function () { btn.textContent = old; }, 1200);
      }
    }
    generateBtn.addEventListener("click", function () {
      saveForm();
      renderResult();
      resultEl.scrollIntoView({ behavior: "smooth", block: "start" });
    });
    resetBtn.addEventListener("click", function () {
      try { localStorage.removeItem(storageKey); } catch {}
      renderForm();
      renderResult();
    });
    renderForm();
    renderResult();
  </script>
</body>
</html>
